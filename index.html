<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sierra Nevada — Jun 7–12</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root {
  --bg0:#ffffff;--bg1:#f4f3f0;--bg2:#eceae7;
  --bg-danger:#FCEBEB;--bg-success:#EAF3DE;--bg-warning:#FAEEDA;--bg-info:#E6F1FB;
  --tx0:#1a1a18;--tx1:#5f5e5a;--tx2:#888780;
  --tx-danger:#791F1F;--tx-success:#27500A;--tx-warning:#633806;--tx-info:#0C447C;
  --bdr:rgba(0,0,0,0.10);--bdr2:rgba(0,0,0,0.18);
  --r8:8px;--r12:12px;--accent:#1D9E75;
  --f:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg0:#1e1e1c;--bg1:#2c2c2a;--bg2:#121210;
    --bg-danger:#791F1F;--bg-success:#27500A;--bg-warning:#633806;--bg-info:#0C447C;
    --tx0:#f0ede8;--tx1:#a8a69f;--tx2:#6e6c66;
    --tx-danger:#F7C1C1;--tx-success:#C0DD97;--tx-warning:#FAC775;--tx-info:#B5D4F4;
    --bdr:rgba(255,255,255,0.10);--bdr2:rgba(255,255,255,0.20);
  }
  .t-dav{background:#633806!important;color:#FAEEDA!important}
  .t-mad{background:#3C3489!important;color:#EEEDFE!important}
  .tag-pill[data-tag="dav"].on{background:#633806!important;color:#FAEEDA!important}
  .tag-pill[data-tag="mad"].on{background:#3C3489!important;color:#EEEDFE!important}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg2);color:var(--tx0);line-height:1.5;padding:2rem 1rem 4rem;min-height:100vh}
.container{max-width:680px;margin:0 auto;background:var(--bg0);border-radius:var(--r12);padding:1.5rem;border:0.5px solid var(--bdr)}
.tag{font-size:10px;border-radius:4px;padding:2px 7px;white-space:nowrap;display:inline-block}
.t-crit{background:var(--bg-danger);color:var(--tx-danger)}
.t-seq{background:var(--bg-warning);color:var(--tx-warning)}
.t-cur{background:var(--bg-success);color:var(--tx-success)}
.t-jer{background:var(--bg-info);color:var(--tx-info)}
.t-dav{background:#FAEEDA;color:#633806}
.t-mad{background:#EEEDFE;color:#3C3489}
/* Tabs */
.tabs{display:flex;border-bottom:0.5px solid var(--bdr2);margin-bottom:1.25rem}
.tab-btn{font-family:var(--f);font-size:13px;font-weight:500;color:var(--tx1);background:none;border:none;padding:8px 14px 9px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s,border-color 0.15s}
.tab-btn.active{color:var(--tx0);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--tx0)}
/* Sections */
.sec-wrap{border:0.5px solid var(--bdr);border-radius:var(--r12);margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;background:var(--bg1);transition:opacity 0.15s}
.sec-hdr:hover{opacity:0.75}
/* Rows */
.irow{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:0.5px solid var(--bdr);transition:opacity 0.15s,background 0.1s}
.irow:last-child{border-bottom:none}
.irow:hover{background:var(--bg1)}
.irow label{cursor:pointer;flex:1}
input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:3px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--f);font-size:12px;color:var(--tx1);background:transparent;border:0.5px solid var(--bdr2);border-radius:var(--r8);padding:5px 10px;cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--bg1)}
.btn-danger{color:var(--tx-danger);border-color:var(--bg-danger)}
.btn-danger:hover{background:var(--bg-danger)}
/* Packing edit mode */
.del-btn{background:none;border:none;cursor:pointer;color:var(--tx2);padding:3px 4px;border-radius:var(--r8);line-height:1;flex-shrink:0;font-size:13px;transition:color 0.15s;font-family:var(--f);margin-top:1px}
.del-btn:hover{color:var(--tx-danger)}
.add-area{padding:10px 14px;background:var(--bg1)}
.add-row{display:flex;gap:6px;margin-bottom:6px}
.add-txt,.add-note{font-family:var(--f);background:var(--bg0);color:var(--tx0);border:0.5px solid var(--bdr2);border-radius:var(--r8);padding:5px 8px;outline:none;transition:border-color 0.15s}
.add-txt{flex:1;font-size:13px}
.add-note{width:100%;font-size:11px;color:var(--tx1);margin-top:4px}
.add-txt:focus,.add-note:focus{border-color:var(--accent)}
.tag-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tag-pill{font-size:10px;border-radius:4px;padding:2px 7px;cursor:pointer;border:0.5px solid var(--bdr2);background:transparent;color:var(--tx1);font-family:var(--f);transition:all 0.12s;line-height:1.4}
.tag-pill[data-tag="crit"].on{background:var(--bg-danger);color:var(--tx-danger);border-color:transparent}
.tag-pill[data-tag="seq"].on{background:var(--bg-warning);color:var(--tx-warning);border-color:transparent}
.tag-pill[data-tag="cur"].on{background:var(--bg-success);color:var(--tx-success);border-color:transparent}
.tag-pill[data-tag="jer"].on{background:var(--bg-info);color:var(--tx-info);border-color:transparent}
.tag-pill[data-tag="dav"].on{background:#FAEEDA;color:#633806;border-color:transparent}
.tag-pill[data-tag="mad"].on{background:#EEEDFE;color:#3C3489;border-color:transparent}
.edit-hint{font-size:11px;color:var(--tx2);margin-top:6px}
</style>
</head>

  <h1 style="font-size:20px;font-weight:500;color:var(--tx0);margin-bottom:2px">Sierra Nevada — Jun 7–12</h1>
  <p style="font-size:13px;color:var(--tx1);margin-bottom:1.25rem">Jeremy, David, Maddy &nbsp;·&nbsp; Groveland → Yosemite Valley → Sequoia / Lodgepole (car camping, walk-in)</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="packing" onclick="switchTab('packing')">Packing list</button>
    <button class="tab-btn" data-tab="prep" onclick="switchTab('prep')">Prep plan</button>
  </div>

  <!-- ═══ PACKING PANEL ═══ -->

        <span style="font-size:13px;color:var(--tx1)">Overall progress</span>
        <span id="ov-c" style="font-size:13px;font-weight:500;color:var(--tx0)"></span>
      </div>
      <div style="height:5px;background:var(--bdr);border-radius:9999px;overflow:hidden">
        <div id="ov-b" style="height:100%;background:var(--accent);border-radius:9999px;width:0%;transition:width 0.2s"></div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center">

      <span class="tag t-mad">Maddy</span>

      <span class="tag t-cur">Curry Village</span>
    </div>
    <div id="sc"></div>
  </div>

  <!-- ═══ PREP PANEL ═══ -->

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem">
      <span style="font-size:13px;color:var(--tx1)">Check off tasks as you go — saves automatically.</span>
      <button class="btn" onclick="resetPrep()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Reset
      </button>
    </div>
    <div style="margin-bottom:1.25rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:var(--tx1)">Prep progress</span>
        <span id="pov-c" style="font-size:13px;font-weight:500;color:var(--tx0)"></span>
      </div>
      <div style="height:5px;background:var(--bdr);border-radius:9999px;overflow:hidden">
        <div id="pov-b" style="height:100%;background:var(--accent);border-radius:9999px;width:0%;transition:width 0.2s"></div>
      </div>
    </div>
    <div id="prep-sc"></div>
  </div>

</div>

/* ─── Tag map ─────────────────────────────────────────────────────────── */
const TM={
  crit:{c:'t-crit',l:'\u25cf Critical'},
  seq:{c:'t-seq',l:'Sequoia only'},
  cur:{c:'t-cur',l:'Curry Village'},
  jer:{c:'t-jer',l:'Jeremy'},
  dav:{c:'t-dav',l:'David'},
  mad:{c:'t-mad',l:'Maddy'},
};

/* ─── State ───────────────────────────────────────────────────────────── */
const PACK_STORE='sierra-packing-jun2026';
const PREP_STORE='sierra-prep-jun2026';
let sections,openSet=new Set(),checkedSet=new Set(),editMode=false;
let prepOpenSet=new Set(),prepCheckedSet=new Set();

function deepCopy(o){return JSON.parse(JSON.stringify(o));}
function mktag(k){const m=TM[k];return m?`<span class="tag ${m.c}">${m.l}</span>`:'';}

/* ─── Tab system ──────────────────────────────────────────────────────── */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('panel-packing').style.display=tab==='packing'?'':'none';
  document.getElementById('panel-prep').style.display=tab==='prep'?'':'none';
}

/* ─── Init ────────────────────────────────────────────────────────────── */
function init(){
  // Packing
  try{
    const s=JSON.parse(localStorage.getItem(PACK_STORE));
    if(s&&Array.isArray(s.sections)){sections=s.sections;checkedSet=new Set(s.checked||[]);openSet=new Set(s.open||[]);}
    else throw 0;
  }catch(e){sections=deepCopy(DEFS);}
  // Prep
  try{
    const p=JSON.parse(localStorage.getItem(PREP_STORE));
    if(p){prepCheckedSet=new Set(p.checked||[]);prepOpenSet=new Set(p.open||[]);}
  }catch(e){}
  // Auto-open current prep phase if nothing is open yet
  if(!prepOpenSet.size){
    const now=new Date();
    const phases=[
      {id:'p0',until:new Date('2026-05-30T00:00:00')},
      {id:'p1',until:new Date('2026-05-31T00:00:00')},
      {id:'p2',until:new Date('2026-06-01T00:00:00')},
      {id:'p3',until:new Date('2026-06-03T00:00:00')},
      {id:'p4',until:new Date('2026-06-05T00:00:00')},
      {id:'p5',until:new Date('2026-06-06T00:00:00')},
      {id:'p6',until:new Date('2026-06-07T00:00:00')},
      {id:'p7',until:new Date('2026-06-08T00:00:00')},
    ];
    const active=phases.find(p=>now<p.until);
    if(active)prepOpenSet.add(active.id);
  }
  render();
  renderPrep();
}

/* ─── Packing: render ─────────────────────────────────────────────────── */
function render(){
  const sy=window.scrollY;
  const sc=document.getElementById('sc');
  sc.innerHTML='';
  sections.forEach(sec=>{
    const isOpen=openSet.has(sec.id);
    const chk=sec.items.filter(item=>checkedSet.has(item.id)).length;
    const tot=sec.items.length;
    const pct=tot?Math.round(chk/tot*100):0;
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    const hdr=document.createElement('div');hdr.className='sec-hdr';
    hdr.setAttribute('role','button');hdr.setAttribute('aria-expanded',String(isOpen));
    hdr.innerHTML=`<i class="ti ${sec.icon}" style="font-size:16px;color:var(--tx1)" aria-hidden="true"></i><span style="font-size:14px;font-weight:500;flex:1;color:var(--tx0)">${sec.title}</span><span id="${sec.id}-c" style="font-size:12px;color:var(--tx1);margin-right:4px">${chk} / ${tot}</span><div style="width:52px;height:4px;background:var(--bdr);border-radius:9999px;overflow:hidden;margin-right:8px"><div id="${sec.id}-b" style="height:100%;background:var(--accent);border-radius:9999px;width:${pct}%"></div></div><i class="ti ti-chevron-down" id="${sec.id}-v" style="font-size:14px;color:var(--tx2);transform:${isOpen?'rotate(180deg)':''}" aria-hidden="true"></i>`;
    const body=document.createElement('div');body.id=`${sec.id}-bd`;body.style.display=isOpen?'block':'none';
    sec.items.forEach(item=>body.appendChild(mkRow(item,sec.id)));
    if(editMode)body.appendChild(mkAddArea(sec.id));
    hdr.addEventListener('click',()=>{
      const nowOpen=body.style.display!=='none';
      body.style.display=nowOpen?'none':'block';
      if(nowOpen)openSet.delete(sec.id);else openSet.add(sec.id);
      document.getElementById(`${sec.id}-v`).style.transform=nowOpen?'':'rotate(180deg)';
      hdr.setAttribute('aria-expanded',String(!nowOpen));
      save();
    });
    wrap.appendChild(hdr);wrap.appendChild(body);sc.appendChild(wrap);
  });
  upd();window.scrollTo(0,sy);
}

/* ─── Packing: item row ───────────────────────────────────────────────── */
function mkRow(item,secId){
  const row=document.createElement('div');row.className='irow';row.id=`row-${item.id}`;
  const isChk=checkedSet.has(item.id);
  if(isChk)row.style.opacity='0.4';
  const tags=item.g.map(mktag).join('');
  const note=item.n?`<div style="font-size:11px;color:var(--tx2);margin-top:2px">${item.n}</div>`:'';
  row.innerHTML=`<input type="checkbox" id="${item.id}" ${isChk?'checked':''}><label for="${item.id}" style="flex:1"><div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px"><span style="font-size:13px;color:var(--tx0)">${item.t}</span>${tags}</div>${note}</label>${editMode?`<button class="del-btn" aria-label="Remove ${item.t}"><i class="ti ti-x" aria-hidden="true"></i></button>`:''}`;
  row.querySelector('input').addEventListener('change',function(){
    row.style.opacity=this.checked?'0.4':'1';
    if(this.checked)checkedSet.add(item.id);else checkedSet.delete(item.id);
    upd();save();
  });
  if(editMode){
    row.querySelector('.del-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const sec=sections.find(s=>s.id===secId);
      if(sec){sec.items=sec.items.filter(i=>i.id!==item.id);checkedSet.delete(item.id);row.remove();upd();save();}
    });
  }
  return row;
}

/* ─── Packing: add area ───────────────────────────────────────────────── */
function mkAddArea(secId){
  const area=document.createElement('div');area.className='add-area';area.id=`${secId}-addarea`;
  const pills=Object.entries(TM).map(([k,m])=>`<button type="button" class="tag-pill" data-tag="${k}">${m.l}</button>`).join('');
  area.innerHTML=`<div class="add-row"><input type="text" id="${secId}-txt" class="add-txt" placeholder="New item\u2026"><button type="button" class="btn" id="${secId}-go">Add</button></div><div class="tag-pills">${pills}</div><input type="text" id="${secId}-note" class="add-note" placeholder="Note (optional)"><p class="edit-hint">Click tags to attach them \xb7 press Enter or click Add</p>`;
  area.querySelectorAll('.tag-pill').forEach(p=>p.addEventListener('click',()=>p.classList.toggle('on')));
  const doAdd=()=>addItem(secId,area);
  area.querySelector(`#${secId}-go`).addEventListener('click',doAdd);
  area.querySelector(`#${secId}-txt`).addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  return area;
}

function addItem(secId,area){
  const txtEl=area.querySelector(`#${secId}-txt`);
  const text=txtEl.value.trim();
  if(!text){txtEl.focus();return;}
  const noteEl=area.querySelector(`#${secId}-note`);
  const activeTags=[...area.querySelectorAll('.tag-pill.on')].map(p=>p.dataset.tag);
  const newItem={t:text,g:activeTags,n:noteEl.value.trim()||null,id:`${secId}_n${Date.now()}`};
  const sec=sections.find(s=>s.id===secId);if(!sec)return;
  sec.items.push(newItem);openSet.add(secId);save();
  const newRow=mkRow(newItem,secId);area.parentNode.insertBefore(newRow,area);
  txtEl.value='';noteEl.value='';area.querySelectorAll('.tag-pill.on').forEach(p=>p.classList.remove('on'));txtEl.focus();
  upd();newRow.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ─── Packing: edit mode ──────────────────────────────────────────────── */
function toggleEdit(){
  editMode=!editMode;
  document.getElementById('edit-btn').innerHTML=editMode?'<i class="ti ti-check" aria-hidden="true"></i> Done':'<i class="ti ti-edit" aria-hidden="true"></i> Edit list';
  document.getElementById('restore-btn').style.display=editMode?'':'none';
  render();
}

/* ─── Packing: progress ───────────────────────────────────────────────── */
function upd(){
  let tc=0,tt=0;
  sections.forEach(sec=>{
    const tot=sec.items.length;
    const chk=sec.items.filter(item=>checkedSet.has(item.id)).length;
    tc+=chk;tt+=tot;
    const p=tot?Math.round(chk/tot*100):0;
    const cEl=document.getElementById(`${sec.id}-c`);
    const bEl=document.getElementById(`${sec.id}-b`);
    if(cEl)cEl.textContent=`${chk} / ${tot}`;
    if(bEl)bEl.style.width=p+'%';
  });
  const p=tt?Math.round(tc/tt*100):0;
  document.getElementById('ov-c').textContent=`${tc} / ${tt} packed`;
  document.getElementById('ov-b').style.width=p+'%';
}

/* ─── Packing: persistence ────────────────────────────────────────────── */
function save(){try{localStorage.setItem(PACK_STORE,JSON.stringify({sections,checked:[...checkedSet],open:[...openSet]}));}catch(e){}}
function resetChecked(){if(!confirm('Clear all checkmarks? Custom items will be kept.'))return;checkedSet.clear();save();render();}
function restoreDefaults(){if(!confirm('Restore original list? All custom edits and checkmarks will be lost.'))return;sections=deepCopy(DEFS);checkedSet.clear();openSet.clear();try{localStorage.removeItem(PACK_STORE);}catch(e){}render();}

/* ─── Prep: render ────────────────────────────────────────────────────── */
function renderPrep(){
  const sy=window.scrollY;
  const sc=document.getElementById('prep-sc');
  sc.innerHTML='';
  PREP.forEach(sec=>{
    const isOpen=prepOpenSet.has(sec.id);
    const chk=sec.items.filter(item=>prepCheckedSet.has(item.id)).length;
    const tot=sec.items.length;
    const pct=tot?Math.round(chk/tot*100):0;
    const allDone=tot>0&&chk===tot;
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    if(allDone)wrap.style.opacity='0.6';
    const hdr=document.createElement('div');hdr.className='sec-hdr';
    hdr.setAttribute('role','button');hdr.setAttribute('aria-expanded',String(isOpen));
    hdr.innerHTML=`<i class="ti ${sec.icon}" style="font-size:16px;color:var(--tx1)" aria-hidden="true"></i><span style="font-size:14px;font-weight:500;flex:1;color:var(--tx0)">${sec.title}</span><span id="${sec.id}-pc" style="font-size:12px;color:var(--tx1);margin-right:4px">${chk} / ${tot}</span><div style="width:52px;height:4px;background:var(--bdr);border-radius:9999px;overflow:hidden;margin-right:8px"><div id="${sec.id}-pb" style="height:100%;background:var(--accent);border-radius:9999px;width:${pct}%"></div></div><i class="ti ti-chevron-down" id="${sec.id}-pv" style="font-size:14px;color:var(--tx2);transform:${isOpen?'rotate(180deg)':''}" aria-hidden="true"></i>`;
    const body=document.createElement('div');body.style.display=isOpen?'block':'none';
    sec.items.forEach(item=>body.appendChild(mkPrepRow(item)));
    hdr.addEventListener('click',()=>{
      const nowOpen=body.style.display!=='none';
      body.style.display=nowOpen?'none':'block';
      if(nowOpen)prepOpenSet.delete(sec.id);else prepOpenSet.add(sec.id);
      document.getElementById(`${sec.id}-pv`).style.transform=nowOpen?'':'rotate(180deg)';
      hdr.setAttribute('aria-expanded',String(!nowOpen));
      savePrep();
    });
    wrap.appendChild(hdr);wrap.appendChild(body);sc.appendChild(wrap);
  });
  updPrep();window.scrollTo(0,sy);
}

/* ─── Prep: item row ──────────────────────────────────────────────────── */
function mkPrepRow(item){
  const row=document.createElement('div');row.className='irow';
  const isChk=prepCheckedSet.has(item.id);
  if(isChk)row.style.opacity='0.4';
  const note=item.n?`<div style="font-size:11px;color:var(--tx2);margin-top:2px">${item.n}</div>`:'';
  row.innerHTML=`<input type="checkbox" id="${item.id}" ${isChk?'checked':''}><label for="${item.id}" style="flex:1"><div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px"><span style="font-size:13px;color:var(--tx0)">${item.t}</span></div>${note}</label>`;
  row.querySelector('input').addEventListener('change',function(){
    row.style.opacity=this.checked?'0.4':'1';
    if(this.checked)prepCheckedSet.add(item.id);else prepCheckedSet.delete(item.id);
    updPrep();savePrep();
    // Fade whole section if all done
    const secEl=row.closest('.sec-wrap');
    if(secEl){
      const allInputs=[...secEl.querySelectorAll('input[type="checkbox"]')];
      secEl.style.opacity=allInputs.every(cb=>cb.checked)?'0.6':'1';
    }
  });
  return row;
}

/* ─── Prep: progress ──────────────────────────────────────────────────── */
function updPrep(){
  let tc=0,tt=0;
  PREP.forEach(sec=>{
    const tot=sec.items.length;
    const chk=sec.items.filter(item=>prepCheckedSet.has(item.id)).length;
    tc+=chk;tt+=tot;
    const p=tot?Math.round(chk/tot*100):0;
    const cEl=document.getElementById(`${sec.id}-pc`);
    const bEl=document.getElementById(`${sec.id}-pb`);
    if(cEl)cEl.textContent=`${chk} / ${tot}`;
    if(bEl)bEl.style.width=p+'%';
  });
  const p=tt?Math.round(tc/tt*100):0;
  document.getElementById('pov-c').textContent=`${tc} / ${tt} done`;
  document.getElementById('pov-b').style.width=p+'%';
}

/* ─── Prep: persistence ───────────────────────────────────────────────── */
function savePrep(){try{localStorage.setItem(PREP_STORE,JSON.stringify({checked:[...prepCheckedSet],open:[...prepOpenSet]}));}catch(e){}}
function resetPrep(){if(!confirm('Clear all prep checkmarks?'))return;prepCheckedSet.clear();savePrep();renderPrep();}

/* ─── Boot ────────────────────────────────────────────────────────────── */
init();
</script>
